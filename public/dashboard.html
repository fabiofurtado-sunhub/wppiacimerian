<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cimerian — Painel Comercial</title>
<style>
/* ---- RESET ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; background: #111b21; color: #e9edef; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
input { font: inherit; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #374045; border-radius: 3px; }

/* ---- LOGIN ---- */
#login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
.login-box { background: #202c33; border-radius: 12px; padding: 40px; width: 100%; max-width: 360px; }
.login-box h1 { font-size: 22px; font-weight: 700; color: #e9edef; margin-bottom: 4px; }
.login-box h1 span { color: #00a884; }
.login-box p { font-size: 13px; color: #8696a0; margin-bottom: 28px; }
.login-box label { display: block; font-size: 12px; color: #8696a0; margin-bottom: 6px; }
.login-box input { width: 100%; background: #2a3942; border: 1px solid #374045; border-radius: 8px; padding: 10px 12px; color: #e9edef; outline: none; margin-bottom: 14px; }
.login-box input:focus { border-color: #00a884; }
.login-box input::placeholder { color: #8696a0; }
.login-box button { width: 100%; background: #00a884; color: #fff; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 600; }
.login-box button:hover { background: #017d62; }
.login-box button:disabled { opacity: 0.6; cursor: not-allowed; }
#login-error { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }

/* ---- APP SHELL ---- */
#app-screen { height: 100vh; overflow: hidden; }
.app-layout { display: flex; height: 100%; }

/* ---- SIDEBAR ---- */
.sidebar { width: 320px; flex-shrink: 0; background: #202c33; display: flex; flex-direction: column; border-right: 1px solid #374045; }
.sidebar-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #374045; flex-shrink: 0; }
.brand { font-size: 17px; font-weight: 700; color: #e9edef; }
.brand span { color: #00a884; }
.sidebar-user { display: flex; align-items: center; gap: 10px; }
.sidebar-user span { font-size: 12px; color: #8696a0; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logout-btn { font-size: 12px; color: #8696a0; padding: 4px 10px; border: 1px solid #374045; border-radius: 6px; }
.logout-btn:hover { border-color: #00a884; color: #00a884; }
.sidebar-search-wrap { padding: 8px 12px; flex-shrink: 0; border-bottom: 1px solid #1a2228; }
.sidebar-search { width: 100%; background: #2a3942; border: none; border-radius: 8px; padding: 8px 12px; color: #e9edef; outline: none; font-size: 13px; }
.sidebar-search::placeholder { color: #8696a0; }

/* ---- CONVERSATIONS IN SIDEBAR ---- */
/* No tab-panel class — always visible, not affected by switchTab() */
#tab-conversations { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.conv-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; flex-shrink: 0; }
.conv-header span { font-size: 11px; font-weight: 600; color: #8696a0; text-transform: uppercase; letter-spacing: 0.05em; }
.btn-icon { font-size: 16px; color: #8696a0; padding: 2px 6px; border-radius: 4px; }
.btn-icon:hover { color: #00a884; background: #2a3942; }
.conv-scroll { flex: 1; overflow-y: auto; min-height: 0; }

/* Conversations table — rendered as list via CSS */
.conv-scroll table { display: block; width: 100%; }
.conv-scroll thead { display: none; }
.conv-scroll tbody { display: block; }

/* Each conversation row as WhatsApp-style list item */
.conv-scroll tbody tr {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  grid-template-rows: 20px 16px;
  column-gap: 10px;
  row-gap: 3px;
  padding: 10px 14px 10px 10px;
  cursor: pointer;
  border-bottom: 1px solid #1a2228;
  border-left: 3px solid transparent;
  align-items: center;
}
.conv-scroll tbody tr:hover { background: #2a3942; }

/* Avatar circle via ::before */
.conv-scroll tbody tr::before {
  content: '';
  grid-column: 1; grid-row: 1 / 3;
  width: 40px; height: 40px;
  border-radius: 50%;
  align-self: center;
  background: #00a884;
}
.conv-scroll tbody tr:nth-child(7n+2)::before { background: #f59e0b; }
.conv-scroll tbody tr:nth-child(7n+3)::before { background: #3b82f6; }
.conv-scroll tbody tr:nth-child(7n+4)::before { background: #8b5cf6; }
.conv-scroll tbody tr:nth-child(7n+5)::before { background: #ef4444; }
.conv-scroll tbody tr:nth-child(7n+6)::before { background: #06b6d4; }
.conv-scroll tbody tr:nth-child(7n)::before   { background: #f97316; }

/* td: phone → hidden */
.conv-scroll td:nth-child(1) { display: none; }
/* td: name → row 1 col 2 */
.conv-scroll td:nth-child(2) { grid-column: 2; grid-row: 1; font-size: 14px; font-weight: 500; color: #e9edef; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; align-self: end; }
/* td: tag → row 1 col 3 */
.conv-scroll td:nth-child(3) { grid-column: 3; grid-row: 1; align-self: end; }
/* td: status → row 2 col 3 */
.conv-scroll td:nth-child(4) { grid-column: 3; grid-row: 2; align-self: start; }
/* td: messageCount → hidden */
.conv-scroll td:nth-child(5) { display: none; }
/* td: lastMessage → row 2 col 2 */
.conv-scroll td:nth-child(6) { grid-column: 2; grid-row: 2; font-size: 12px; color: #8696a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; align-self: start; }

/* Loading / empty row overrides grid */
.conv-scroll tbody tr:only-child { display: block !important; }

/* ---- BADGES ---- */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-active  { background: rgba(245,158,11,0.15); color: #f59e0b; }   /* em andamento */
.badge-closed  { background: rgba(134,150,160,0.15); color: #8696a0; }  /* encerrado */
.badge-tag     { background: rgba(59,130,246,0.15);  color: #5b8dee; }  /* tag */

/* ---- MAIN AREA ---- */
.main-area { flex: 1; background: #0b141a; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Tabs — Métricas | [hidden Conversas] | Leads */
.main-tabs { background: #202c33; display: flex; border-bottom: 1px solid #374045; flex-shrink: 0; }
.tab-btn { padding: 14px 24px; font-size: 14px; color: #8696a0; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #00a884; border-bottom-color: #00a884; }
.tab-btn:hover:not(.active) { color: #e9edef; background: #2a3942; }

/* Tab panels */
.tab-panel { display: none; flex: 1; overflow-y: auto; padding: 24px; flex-direction: column; }
.tab-panel.active { display: flex; }

/* Panel header */
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-shrink: 0; }
.panel-header h2 { font-size: 16px; font-weight: 600; color: #e9edef; }
.refresh-btn { font-size: 12px; color: #8696a0; padding: 5px 12px; border: 1px solid #374045; border-radius: 6px; }
.refresh-btn:hover { border-color: #00a884; color: #00a884; }

/* ---- METRICS ---- */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.metric-card { background: #202c33; border-radius: 10px; padding: 20px; }
.metric-card .label { font-size: 12px; color: #8696a0; margin-bottom: 8px; }
.metric-card .value { font-size: 28px; font-weight: 700; color: #e9edef; }
.metric-card .value.accent { color: #00a884; }
.tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-item { background: #202c33; border: 1px solid #374045; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #8696a0; }
.tag-item span { color: #00a884; font-weight: 700; margin-left: 6px; }

/* ---- LEADS TABLE ---- */
.leads-filter { margin-bottom: 14px; flex-shrink: 0; }
.leads-filter input { background: #202c33; border: 1px solid #374045; border-radius: 8px; padding: 8px 12px; color: #e9edef; font-size: 13px; outline: none; width: 280px; }
.leads-filter input:focus { border-color: #00a884; }
.leads-filter input::placeholder { color: #8696a0; }
.table-wrap { background: #202c33; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; color: #8696a0; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #374045; }
tbody tr { border-bottom: 1px solid #1a2228; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #1a2a33; }
tbody td { padding: 10px 14px; color: #e9edef; font-size: 13px; }
tbody td.phone { font-family: monospace; font-size: 12px; color: #8696a0; }

/* ---- LOADING / EMPTY ---- */
.loading { text-align: center; color: #8696a0; padding: 32px 16px; font-size: 13px; }
.empty   { text-align: center; color: #8696a0; padding: 32px 16px; font-size: 13px; }

/* ---- MODAL (chat history) ---- */
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
#modal-overlay.open { display: flex; }
.modal { background: #0b141a; border-radius: 12px; width: 100%; max-width: 680px; height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-header { background: #202c33; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid #374045; }
.modal-header h3 { font-size: 15px; font-weight: 600; color: #e9edef; }
.modal-close { font-size: 22px; color: #8696a0; padding: 0 4px; line-height: 1; }
.modal-close:hover { color: #e9edef; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; background: #0b141a; }
.msg { padding: 8px 12px; border-radius: 8px; max-width: 65%; font-size: 13px; line-height: 1.5; word-break: break-word; }
.msg.user      { background: #202c33; color: #e9edef; align-self: flex-start; border-radius: 0 8px 8px 8px; }
.msg.assistant { background: #005c4b; color: #e9edef; align-self: flex-end;   border-radius: 8px 0 8px 8px; }
.msg .role-label { font-size: 10px; color: #8696a0; margin-bottom: 3px; font-weight: 600; text-transform: uppercase; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Cimerian <span>·</span></h1>
    <p>Painel Comercial — acesso restrito</p>
    <label for="email">E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="username">
    <label for="password">Senha</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button id="login-btn" onclick="doLogin()">Entrar</button>
    <div id="login-error">E-mail ou senha incorretos.</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">Cimerian <span>·</span></div>
        <div class="sidebar-user">
          <span id="user-name"></span>
          <button class="logout-btn" onclick="doLogout()">Sair</button>
        </div>
      </div>
      <div class="sidebar-search-wrap">
        <input type="search" class="sidebar-search" placeholder="🔍  Buscar conversa...">
      </div>
      <!-- NO tab-panel class — stays visible regardless of active tab -->
      <div id="tab-conversations">
        <div class="conv-header">
          <span>Conversas</span>
          <button class="btn-icon" onclick="loadConversations()" title="Atualizar">↻</button>
        </div>
        <div class="conv-scroll">
          <table>
            <thead>
              <tr><th>Telefone</th><th>Nome</th><th>Tag</th><th>Status</th><th>Msgs</th><th>Última mensagem</th></tr>
            </thead>
            <tbody id="conv-tbody">
              <tr><td colspan="6" class="loading">Clique em ↻ para carregar</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </aside>

    <!-- MAIN AREA -->
    <div class="main-area">
      <!--
        Tab-btn indexes must match JS: ['metrics', 'conversations', 'leads']
        Index 1 (conversations) is hidden — sidebar handles conversations
      -->
      <div class="main-tabs">
        <button class="tab-btn active" onclick="switchTab('metrics')">Métricas</button>
        <button class="tab-btn" onclick="switchTab('conversations')" style="display:none" aria-hidden="true"></button>
        <button class="tab-btn" onclick="switchTab('leads')">Leads</button>
      </div>

      <!-- METRICS -->
      <div id="tab-metrics" class="tab-panel active">
        <div class="panel-header">
          <h2>Visão Geral</h2>
          <button class="refresh-btn" onclick="loadMetrics()">Atualizar</button>
        </div>
        <div class="metrics-grid" id="metrics-grid">
          <div class="loading">Carregando...</div>
        </div>
        <div id="tag-breakdown-section" style="display:none;">
          <h2 style="font-size:13px;color:#8696a0;margin-bottom:10px;">Distribuição por Tag</h2>
          <div class="tag-list" id="tag-list"></div>
        </div>
      </div>

      <!-- LEADS -->
      <div id="tab-leads" class="tab-panel">
        <div class="panel-header">
          <h2>Leads</h2>
          <button class="refresh-btn" onclick="loadLeads()">Atualizar</button>
        </div>
        <div class="leads-filter">
          <input type="text" id="lead-search" placeholder="Buscar por nome ou telefone..." oninput="filterLeads()">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Data</th><th>Telefone</th><th>Nome</th><th>Cidade/UF</th>
                <th>Perfil</th><th>Tag</th><th>Status</th><th>Agendamento</th>
              </tr>
            </thead>
            <tbody id="leads-tbody">
              <tr><td colspan="8" class="loading">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div><!-- .main-area -->

  </div><!-- .app-layout -->
</div><!-- #app-screen -->

<!-- MODAL — chat history overlay -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Conversa</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="chat-messages" id="modal-chat"></div>
  </div>
</div>

<script>
  const API = '';
  let token = localStorage.getItem('cimerian_token') || '';
  let userName = localStorage.getItem('cimerian_user') || '';
  let allLeads = [];
  let activeTab = 'metrics';

  function init() {
    if (token) {
      showApp();
    }
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    try {
      const res = await fetch(API + '/api/dashboard/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro');
      token = data.token;
      userName = data.name || email;
      localStorage.setItem('cimerian_token', token);
      localStorage.setItem('cimerian_user', userName);
      showApp();
    } catch (e) {
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
  });

  function doLogout() {
    token = '';
    userName = '';
    localStorage.removeItem('cimerian_token');
    localStorage.removeItem('cimerian_user');
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('user-name').textContent = userName;
    loadMetrics();
    loadConversations();
  }

  function switchTab(name) {
    activeTab = name;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      const tabs = ['metrics', 'conversations', 'leads'];
      b.classList.toggle('active', tabs[i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'metrics') loadMetrics();
    if (name === 'conversations') loadConversations();
    if (name === 'leads') loadLeads();
  }

  function authHeaders() {
    return { 'Authorization': 'Bearer ' + token };
  }

  async function apiFetch(path) {
    const res = await fetch(API + path, { headers: authHeaders() });
    if (res.status === 401) { doLogout(); throw new Error('Unauthorized'); }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  // ---- METRICS ----
  async function loadMetrics() {
    document.getElementById('metrics-grid').innerHTML = '<div class="loading">Carregando...</div>';
    document.getElementById('tag-breakdown-section').style.display = 'none';
    try {
      const d = await apiFetch('/api/dashboard/metrics');
      const grid = document.getElementById('metrics-grid');
      grid.innerHTML = `
        <div class="metric-card"><div class="label">Leads hoje</div><div class="value accent">${d.todayCount ?? 0}</div></div>
        <div class="metric-card"><div class="label">Total de leads</div><div class="value">${d.totalLeads ?? 0}</div></div>
        <div class="metric-card"><div class="label">Agendamentos</div><div class="value">${d.scheduledCount ?? 0}</div></div>
        <div class="metric-card"><div class="label">Taxa conversão</div><div class="value">${d.conversionRate ?? '0%'}</div></div>
      `;
      if (d.tagBreakdown && Object.keys(d.tagBreakdown).length > 0) {
        const tagEl = document.getElementById('tag-list');
        tagEl.innerHTML = Object.entries(d.tagBreakdown)
          .sort((a, b) => b[1] - a[1])
          .map(([tag, count]) => `<div class="tag-item">${tag}<span>${count}</span></div>`)
          .join('');
        document.getElementById('tag-breakdown-section').style.display = 'block';
      }
    } catch (e) {
      document.getElementById('metrics-grid').innerHTML = '<div class="empty">Erro ao carregar métricas.</div>';
    }
  }

  // ---- CONVERSATIONS ----
  async function loadConversations() {
    document.getElementById('conv-tbody').innerHTML = '<tr><td colspan="6" class="loading">Carregando...</td></tr>';
    try {
      const list = await apiFetch('/api/dashboard/conversations');
      const tbody = document.getElementById('conv-tbody');
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Nenhuma conversa encontrada.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(c => `
        <tr onclick="openConversation('${esc(c.phone)}', '${esc(c.leadName || c.phone)}')">
          <td class="phone">${esc(c.phone)}</td>
          <td>${esc(c.leadName || '—')}</td>
          <td>${c.tag ? '<span class="badge badge-tag">' + esc(c.tag) + '</span>' : '—'}</td>
          <td><span class="badge ${c.active ? 'badge-active' : 'badge-closed'}">${c.active ? 'Ativo' : 'Encerrado'}</span></td>
          <td>${c.messageCount ?? 0}</td>
          <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#666">${esc(c.lastMessage || '')}</td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('conv-tbody').innerHTML = '<tr><td colspan="6" class="empty">Erro ao carregar conversas.</td></tr>';
    }
  }

  async function openConversation(phone, name) {
    document.getElementById('modal-title').textContent = name + ' · ' + phone;
    document.getElementById('modal-chat').innerHTML = '<div class="loading">Carregando...</div>';
    document.getElementById('modal-overlay').classList.add('open');
    try {
      const data = await apiFetch('/api/dashboard/conversation?phone=' + encodeURIComponent(phone));
      const history = (data && data.history) ? data.history : [];
      const chatEl = document.getElementById('modal-chat');
      if (!history.length) {
        chatEl.innerHTML = '<div class="empty">Sem mensagens.</div>';
        return;
      }
      chatEl.innerHTML = history.map(m => `
        <div class="msg ${m.role}">
          <div class="role-label">${m.role === 'user' ? 'Lead' : 'Fabio IA'}</div>
          ${esc(m.content)}
        </div>
      `).join('');
      chatEl.scrollTop = chatEl.scrollHeight;
    } catch (e) {
      document.getElementById('modal-chat').innerHTML = '<div class="empty">Erro ao carregar conversa.</div>';
    }
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  // ---- LEADS ----
  async function loadLeads() {
    document.getElementById('leads-tbody').innerHTML = '<tr><td colspan="8" class="loading">Carregando...</td></tr>';
    try {
      allLeads = await apiFetch('/api/dashboard/leads');
      renderLeads(allLeads);
    } catch (e) {
      document.getElementById('leads-tbody').innerHTML = '<tr><td colspan="8" class="empty">Erro ao carregar leads.</td></tr>';
    }
  }

  function filterLeads() {
    const q = document.getElementById('lead-search').value.toLowerCase();
    if (!q) { renderLeads(allLeads); return; }
    renderLeads(allLeads.filter(l =>
      (l.nome || '').toLowerCase().includes(q) ||
      (l.telefone || '').toLowerCase().includes(q)
    ));
  }

  function renderLeads(list) {
    const tbody = document.getElementById('leads-tbody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">Nenhum lead encontrado.</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(l => `
      <tr>
        <td style="color:#8696a0;font-size:12px">${esc(l.timestamp || '—')}</td>
        <td class="phone">${esc(l.telefone || '—')}</td>
        <td>${esc(l.nome || '—')}</td>
        <td style="color:#8696a0">${esc([l.cidade, l.estado].filter(Boolean).join('/') || '—')}</td>
        <td style="color:#8696a0">${esc(l.perfil || '—')}</td>
        <td>${l.tag ? '<span class="badge badge-tag">' + esc(l.tag) + '</span>' : '—'}</td>
        <td>${esc(l.status || '—')}</td>
        <td style="font-size:12px;color:#8696a0">${esc(l.agendamento || '—')}</td>
      </tr>
    `).join('');
  }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  init();
</script>
</body>
</html>
